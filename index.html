<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- 生产环境移除 vConsole，调试时手动添加 -->
  <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>瓦力赛车口语搭子 🏎️</title>
  <style>
    /* ============================================
       全局重置与基础样式
       ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: #0d0d0d;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
    }

    /* ============================================
       启动遮罩层（解决浏览器自动播放限制）
       ============================================ */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #1a1a2e 0%, #0d0d0d 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.5s;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .overlay-title {
      font-size: 36px;
      font-weight: 900;
      color: #ffcc00;
      text-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    .overlay-subtitle {
      font-size: 20px;
      color: #ccc;
      margin-bottom: 40px;
    }

    .start-btn {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 10px solid #ffcc00;
      background: #e10600;
      color: #fff;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 40px rgba(225, 6, 0, 0.5), inset 0 0 20px rgba(0,0,0,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    .start-btn:active {
      transform: scale(0.95);
      box-shadow: 0 0 20px rgba(225, 6, 0, 0.3);
    }

    .overlay-hint {
      margin-top: 30px;
      font-size: 14px;
      color: #666;
    }

    /* 格子旗装饰条 */
    .checkered-flag {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 12px;
      background: repeating-linear-gradient(
        90deg,
        #fff 0px, #fff 12px,
        #000 12px, #000 24px
      );
      opacity: 0.3;
    }

    /* ============================================
       主应用界面
       ============================================ */
    .app {
      display: none;
      flex-direction: column;
      height: 100%;
      position: relative;
    }

    .app.active {
      display: flex;
    }

    /* 顶部标题栏 */
    .header {
      padding: 16px;
      text-align: center;
      background: linear-gradient(180deg, rgba(26,26,46,0.9) 0%, transparent 100%);
      position: relative;
    }

    .header-title {
      font-size: 24px;
      font-weight: 800;
      color: #ffcc00;
      letter-spacing: 2px;
    }

    .header-sub {
      font-size: 14px;
      color: #888;
      margin-top: 4px;
    }

    /* 对话气泡区域 */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    /* 隐藏滚动条但保留滚动功能 */
    .chat-area::-webkit-scrollbar {
      width: 0;
    }

    .bubble {
      max-width: 80%;
      padding: 14px 18px;
      font-size: 18px;
      line-height: 1.6;
      word-break: break-word;
      animation: popIn 0.3s ease-out;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .bubble-user {
      align-self: flex-end;
      background: #e10600;
      color: #fff;
      border-radius: 20px 20px 4px 20px;
      box-shadow: 0 4px 15px rgba(225, 6, 0, 0.3);
    }

    .bubble-assistant {
      align-self: flex-start;
      background: #ffcc00;
      color: #1a1a1a;
      border-radius: 20px 20px 20px 4px;
      box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
    }

    .bubble-system {
      align-self: center;
      background: rgba(255,255,255,0.08);
      color: #888;
      font-size: 14px;
      border-radius: 12px;
      padding: 8px 16px;
    }

    .bubble-label {
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 4px;
      opacity: 0.7;
    }

    /* 底部控制区 */
    .control-area {
      padding: 20px 16px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background: linear-gradient(0deg, rgba(13,13,13,1) 0%, transparent 100%);
    }

    /* 巨大的方向盘按钮 */
    .talk-btn {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 8px solid #ffcc00;
      background: #e10600;
      color: #fff;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
      box-shadow: 0 10px 40px rgba(225, 6, 0, 0.4), inset 0 0 15px rgba(0,0,0,0.2);
      transition: all 0.2s ease;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      position: relative;
    }

    .talk-btn:active {
      transform: scale(0.96);
    }

    .talk-btn:disabled {
      cursor: not-allowed;
    }

    .talk-btn .btn-icon {
      font-size: 40px;
      line-height: 1;
    }

    /* 按钮状态样式 */
    .talk-btn.state-idle {
      background: #e10600;
      border-color: #ffcc00;
    }

    .talk-btn.state-listening {
      background: #ff1a1a;
      border-color: #ff6666;
      box-shadow: 0 0 50px rgba(255, 26, 26, 0.6);
      animation: pulse-red 1s infinite;
    }

    .talk-btn.state-thinking {
      background: #ffcc00;
      border-color: #ffdb4d;
      color: #1a1a1a;
      box-shadow: 0 0 40px rgba(255, 204, 0, 0.5);
      animation: spin-slow 3s linear infinite;
    }

    .talk-btn.state-speaking {
      background: #ff6600;
      border-color: #ffaa33;
      box-shadow: 0 0 40px rgba(255, 102, 0, 0.5);
      animation: pulse-orange 1.2s infinite;
    }

    @keyframes pulse-red {
      0%, 100% { transform: scale(1); box-shadow: 0 0 50px rgba(255, 26, 26, 0.6); }
      50% { transform: scale(1.03); box-shadow: 0 0 70px rgba(255, 26, 26, 0.8); }
    }

    @keyframes pulse-orange {
      0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(255, 102, 0, 0.5); }
      50% { transform: scale(1.02); box-shadow: 0 0 60px rgba(255, 102, 0, 0.7); }
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* 状态文字 */
    .status-text {
      font-size: 16px;
      color: #888;
      font-weight: 600;
      letter-spacing: 1px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status-text .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .status-text.idle .dot { background: #666; }
    .status-text.listening .dot { background: #ff1a1a; animation: blink 0.8s infinite; }
    .status-text.thinking .dot { background: #ffcc00; animation: blink 0.5s infinite; }
    .status-text.speaking .dot { background: #ff6600; animation: blink 1s infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* 实时识别文字预览 */
    .interim-bubble {
      align-self: flex-end;
      background: rgba(225, 6, 0, 0.3);
      color: #fff;
      border-radius: 20px 20px 4px 20px;
      padding: 10px 16px;
      font-size: 16px;
      font-style: italic;
      border: 1px dashed rgba(225, 6, 0, 0.5);
      animation: popIn 0.2s ease-out;
    }
  </style>
</head>
<body>

  <!-- ============================================
       启动遮罩：用户点击后解锁音频自动播放
       ============================================ -->
  <div id="overlay" class="overlay">
    <div class="checkered-flag"></div>
    <div class="overlay-title">🏎️ 瓦力赛车口语搭子</div>
    <div class="overlay-subtitle">和瓦力一起飙英语，Ready？</div>
    <button id="startBtn" class="start-btn">🔥<br>启动引擎</button>
    <div class="overlay-hint">推荐使用 Chrome / Edge 浏览器</div>
  </div>

  <!-- ============================================
       主应用界面
       ============================================ -->
  <div id="app" class="app">
    <div class="checkered-flag"></div>
    <div class="header">
      <div class="header-title">🏁 瓦力赛车口语搭子</div>
      <div class="header-sub">按住方向盘，和瓦力聊天！</div>
    </div>

    <!-- 对话气泡区域 -->
    <div class="chat-area" id="chatArea"></div>

    <!-- 控制区域 -->
    <div class="control-area">
      <button id="talkBtn" class="talk-btn state-idle">
        <span class="btn-icon" id="btnIcon">🎙️</span>
        <span id="btnText">按住说话</span>
      </button>
      <div class="status-text idle" id="statusText">
        <span class="dot"></span>
        <span id="statusLabel">待机中</span>
      </div>
    </div>
  </div>

  <script>
    // ============================================
    // 🚨 全局错误捕获（移动端调试必备）
    // ============================================
    window.onerror = function(message, source, lineno, colno, error) {
      console.error('[GLOBAL ERROR]', message, 'at', source + ':' + lineno + ':' + colno, error);
    };
    window.onunhandledrejection = function(event) {
      console.error('[UNHANDLED REJECTION]', event.reason);
    };

    // ============================================
    // 🛠️ API 配置区域
    // ============================================
    const WALLI_CONFIG = {
      BFF_URL: 'https://1304982535-2skhmjajtq.ap-beijing.tencentscf.com'
    };

    // ============================================
    // 全局状态与变量
    // ============================================
    /** 当前状态机状态：idle / listening / thinking / speaking */
    let currentState = 'idle';

    /** MediaRecorder 相关 */
    let mediaRecorder = null;
    let recordedChunks = [];
    let recordTimer = null;
    let recordWarningTimer = null;

    /** 全局 Audio 实例（用于 TTS 播放） */
    let globalAudio = new Audio();

    /** BFF 接口地址 */
    const BFF_URL = WALLI_CONFIG.BFF_URL;

    // DOM 元素引用
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const app = document.getElementById('app');
    const talkBtn = document.getElementById('talkBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.getElementById('btnIcon');
    const statusText = document.getElementById('statusText');
    const statusLabel = document.getElementById('statusLabel');
    const chatArea = document.getElementById('chatArea');

    // ============================================
    // 状态机控制
    // ============================================
    function setState(newState) {
      currentState = newState;
      talkBtn.classList.remove('state-idle', 'state-listening', 'state-thinking', 'state-speaking');
      statusText.classList.remove('idle', 'listening', 'thinking', 'speaking');
      switch (newState) {
        case 'idle':
          talkBtn.classList.add('state-idle');
          statusText.classList.add('idle');
          btnText.textContent = '按住说话';
          btnIcon.textContent = '🎙️';
          statusLabel.textContent = '待机中';
          talkBtn.disabled = false;
          break;
        case 'listening':
          talkBtn.classList.add('state-listening');
          statusText.classList.add('listening');
          btnText.textContent = '正在听...';
          btnIcon.textContent = '👂';
          statusLabel.textContent = '正在听...';
          talkBtn.disabled = false;
          break;
        case 'thinking':
          talkBtn.classList.add('state-thinking');
          statusText.classList.add('thinking');
          btnText.textContent = '引擎启动中...';
          btnIcon.textContent = '⚙️';
          statusLabel.textContent = '引擎启动中...';
          talkBtn.disabled = true;
          break;
        case 'speaking':
          talkBtn.classList.add('state-speaking');
          statusText.classList.add('speaking');
          btnText.textContent = '瓦力说话中...';
          btnIcon.textContent = '🔊';
          statusLabel.textContent = '瓦力说话中...';
          talkBtn.disabled = false;
          break;
      }
    }

    // ============================================
    // 对话气泡 UI 管理
    // ============================================
    function addBubble(role, text) {
      const bubble = document.createElement('div');
      bubble.className = `bubble bubble-${role}`;
      let label = '';
      if (role === 'user') label = '豆豆 🏎️';
      if (role === 'assistant') label = '瓦力 🏁';
      if (label) {
        bubble.innerHTML = `<div class="bubble-label">${label}</div>${escapeHtml(text)}`;
      } else {
        bubble.textContent = text;
      }
      chatArea.appendChild(bubble);
      scrollToBottom();
    }

    function scrollToBottom() {
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ============================================
    // 开场白
    // ============================================
    async function sayOpening() {
      setState('speaking');
      const fallbackOpening = 'Vroom Vroom！豆豆！🏎️ 瓦力引擎已热好！Ready to race？今天咱们去哪条赛道撒野？';
      addBubble('assistant', fallbackOpening);
      setState('idle');
    }

    // ============================================
    // 录音功能：getUserMedia + MediaRecorder (WebM/Opus)
    // ============================================
    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
          ? 'audio/webm;codecs=opus'
          : (MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4');
        mediaRecorder = new MediaRecorder(stream, { mimeType });
        recordedChunks = [];
        mediaRecorder.ondataavailable = (e) => {
          if (e.data && e.data.size > 0) recordedChunks.push(e.data);
        };
        mediaRecorder.onstop = () => {
          const blob = new Blob(recordedChunks, { type: mimeType });
          handleRecordingComplete(blob);
          stream.getTracks().forEach(t => t.stop());
        };
        mediaRecorder.onerror = (e) => {
          console.error('[MediaRecorder] 错误:', e);
          resetToIdle();
          alert('录音出错，请重试');
        };
        mediaRecorder.start(100);
        setState('listening');

        // 10秒视觉预警
        recordWarningTimer = setTimeout(() => {
          if (currentState === 'listening') {
            btnText.textContent = '还剩5秒...';
          }
        }, 10000);

        // 15秒硬上限自动 stop
        recordTimer = setTimeout(() => {
          if (mediaRecorder && mediaRecorder.state === 'recording') {
            stopRecording();
          }
        }, 15000);
      } catch (err) {
        console.error('[录音启动失败]', err);
        alert('录音启动失败：' + (err.name === 'NotAllowedError' ? '请允许麦克风权限' : err.message));
        resetToIdle();
      }
    }

    function stopRecording() {
      if (recordTimer) { clearTimeout(recordTimer); recordTimer = null; }
      if (recordWarningTimer) { clearTimeout(recordWarningTimer); recordWarningTimer = null; }
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
    }

    // ============================================
    // 录音完成后处理：/api/chat(format=json) → /api/tts → 全局 Audio 播放
    // ============================================
    async function handleRecordingComplete(audioBlob) {
      if (!BFF_URL || BFF_URL.includes('YOUR_API_GATEWAY_DOMAIN')) {
        alert('BFF 地址未配置');
        resetToIdle();
        return;
      }
      setState('thinking');
      addBubble('user', '🎤 [语音消息]');

      try {
        // 1. POST /api/chat?format=json 获取 ASR + LLM 回复文本
        const formData = new FormData();
        formData.append('audio', audioBlob, 'recording.webm');
        formData.append('format', 'json');

        const chatRes = await fetch(BFF_URL + '/api/chat', {
          method: 'POST',
          body: formData,
        });
        if (!chatRes.ok) {
          const errText = await chatRes.text().catch(() => '');
          throw new Error(`BFF /api/chat 错误 ${chatRes.status}: ${errText}`);
        }
        const chatData = await chatRes.json();
        if (chatData.status !== 'ok') {
          throw new Error(chatData.message || '聊天接口返回错误');
        }
        const replyText = chatData.replyText;
        addBubble('assistant', replyText);

        // 2. POST /api/tts 获取音频
        const ttsRes = await fetch(BFF_URL + '/api/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: replyText }),
        });
        if (!ttsRes.ok) {
          const errText = await ttsRes.text().catch(() => '');
          throw new Error(`BFF /api/tts 错误 ${ttsRes.status}: ${errText}`);
        }

        // 3. 全局 Audio 实例边下边播
        const ttsBlob = await ttsRes.blob();
        const ttsUrl = URL.createObjectURL(ttsBlob);
        globalAudio.src = ttsUrl;
        setState('speaking');

        globalAudio.onended = () => {
          setState('idle');
          URL.revokeObjectURL(ttsUrl);
        };
        globalAudio.onerror = (e) => {
          console.error('[Audio 播放错误]', e);
          setState('idle');
          URL.revokeObjectURL(ttsUrl);
        };

        await globalAudio.play();
      } catch (err) {
        console.error('[处理失败]', err);
        addBubble('system', '瓦力的引擎熄火了，再试一次！🏎️💨');
        setState('idle');
      }
    }

    // ============================================
    // 打断与 Reset
    // ============================================
    function interruptSpeaking() {
      globalAudio.pause();
      globalAudio.currentTime = 0;
      setState('idle');
    }

    function resetToIdle() {
      if (recordTimer) { clearTimeout(recordTimer); recordTimer = null; }
      if (recordWarningTimer) { clearTimeout(recordWarningTimer); recordWarningTimer = null; }
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        try { mediaRecorder.stop(); } catch (e) {}
      }
      globalAudio.pause();
      globalAudio.currentTime = 0;
      setState('idle');
    }

    // ============================================
    // 按钮事件：0ms 视觉欺骗 + 打断 + 录音
    // ============================================
    function onTalkBtnPress(e) {
      e.preventDefault();
      // 0ms 视觉欺骗：touchstart 瞬间改变样式，不等 getUserMedia 回调
      if (currentState === 'idle') {
        talkBtn.classList.remove('state-idle');
        talkBtn.classList.add('state-listening');
        statusText.classList.remove('idle');
        statusText.classList.add('listening');
        btnText.textContent = '正在听...';
        btnIcon.textContent = '👂';
        statusLabel.textContent = '正在听...';
      }

      if (currentState === 'thinking') return;

      if (currentState === 'speaking') {
        // 打断妥协：仅 pause + currentTime=0，松手后回 idle
        globalAudio.pause();
        globalAudio.currentTime = 0;
        setState('idle');
        return;
      }

      if (currentState === 'idle') {
        startRecording();
      }
    }

    function onTalkBtnRelease(e) {
      e.preventDefault();
      if (currentState === 'listening') {
        stopRecording();
      }
    }

    talkBtn.addEventListener('mousedown', onTalkBtnPress);
    talkBtn.addEventListener('touchstart', onTalkBtnPress, { passive: false });
    talkBtn.addEventListener('mouseup', onTalkBtnRelease);
    talkBtn.addEventListener('touchend', onTalkBtnRelease, { passive: false });
    talkBtn.addEventListener('mouseleave', onTalkBtnRelease);

    // ============================================
    // 异常防御：权限拒绝 / 后台切换自动 Reset
    // ============================================
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && currentState !== 'idle') {
        console.log('[visibilitychange] 页面切换到后台，自动重置');
        resetToIdle();
      }
    });

    window.addEventListener('offline', () => {
      if (currentState !== 'idle') {
        console.log('[offline] 网络断开，自动重置');
        resetToIdle();
        alert('网络已断开，请检查网络后重试');
      }
    });

    // ============================================
    // 启动入口
    // ============================================
    startBtn.addEventListener('click', async () => {
      console.log('[DEBUG] 启动按钮被点击');
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') {
          await audioCtx.resume();
        }
        const silentBuffer = audioCtx.createBuffer(1, 1, 22050);
        const source = audioCtx.createBufferSource();
        source.buffer = silentBuffer;
        source.connect(audioCtx.destination);
        source.start(0);
        console.log('[DEBUG] 音频上下文已解锁');
      } catch (e) {
        console.warn('[DEBUG] 音频上下文解锁失败:', e);
      }

      overlay.classList.add('hidden');
      app.classList.add('active');
      await sayOpening();
    });
  </script>
</body>
</html>
